    <style>
        /* Design Orange & Noir Premium - Responsive "App-like" */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-orange: #ff6600;
            --text-main: #e0e0e0;
            --text-muted: #aaa;
            --hover-shadow: rgba(255, 102, 0, 0.4);
            --danger-red: #ff4d4d;
            --danger-bg: rgba(255, 77, 77, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Enlève le flash bleu au clic sur mobile */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            background-color: #000;
            color: var(--primary-orange);
            padding: 25px 0;
            text-align: center;
            border-bottom: 2px solid var(--primary-orange);
        }
        h1 { margin: 0; font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

        /* BARRE DE RECHERCHE STICKY */
        .search-wrapper {
            position: sticky;
            top: 0;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(10px);
            z-index: 50;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
        }
        #searchInput {
            width: 100%;
            max-width: 600px;
            display: block;
            margin: 0 auto;
            padding: 14px 25px;
            font-size: 1.1em;
            border: 2px solid #333;
            border-radius: 30px;
            background-color: var(--card-bg);
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }
        #searchInput:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.3);
        }
        #searchInput::placeholder { color: #777; font-style: italic; }

        /* FILTRES SCROLLABLES SUR MOBILE */
        .filters-wrapper {
            width: 100%;
            overflow: hidden;
        }
        .filters {
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 12px; 
            margin: 20px auto; 
            max-width: 1200px; 
            padding: 0 20px;
        }
        button {
            padding: 10px 24px; border: 2px solid var(--primary-orange); border-radius: 30px;
            background-color: transparent; color: var(--primary-orange); cursor: pointer; font-weight: bold;
            font-size: 0.9em; text-transform: uppercase; transition: all 0.3s ease; white-space: nowrap;
        }
        button:hover, button.active { background-color: var(--primary-orange); color: #000; box-shadow: 0 0 15px var(--primary-orange); }

        /* GRILLE */
        #shop-container {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 25px;
            max-width: 1200px; margin: 0 auto 50px auto; padding: 20px; width: 100%; flex-grow: 1;
        }

        .shop-card {
            background-color: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid #333;
            text-align: center; transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        .shop-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px var(--hover-shadow); border-color: var(--primary-orange); }

        .shop-logo-container {
            width: 70px; height: 70px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background-color: #2a2a2a; border: 2px solid #333; transition: border-color 0.3s ease;
        }
        .shop-card:hover .shop-logo-container { border-color: var(--primary-orange); }

        .logo-initial { font-size: 2.2em; font-weight: bold; color: var(--primary-orange); text-transform: uppercase; }
        .shop-card h3 { color: #fff; margin: 5px 0 10px 0; font-size: 1.1em; font-weight: 700; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .category-badge {
            display: inline-block; padding: 4px 12px; background-color: #2a2a2a; color: var(--primary-orange);
            border: 1px solid var(--primary-orange); border-radius: 20px; font-size: 0.7em; font-weight: bold; letter-spacing: 1px;
        }
        .shop-card:hover .category-badge { background-color: var(--primary-orange); color: #000; }

        /* MODAL (POP-UP) */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--card-bg); color: var(--text-main); margin: 5% auto; padding: 40px; border: 2px solid var(--primary-orange);
            border-radius: 20px; width: 85%; max-width: 600px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            max-height: 85vh; overflow-y: auto; 
        }
        .close-modal { color: var(--primary-orange); position: absolute; top: 15px; right: 25px; font-size: 35px; font-weight: bold; cursor: pointer; }
        
        #modal-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; text-align: center; }
        #modal-body h2 { color: var(--primary-orange); margin-bottom: 5px; font-size: 2em; }
        
        .option-block { text-align: left; background-color: #1a1a1a; padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; }
        .option-block h4 { color: #fff; margin-top: 0; margin-bottom: 15px; font-size: 1.1em; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .modal-detail-line { font-size: 1.05em; margin-bottom: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; }
        .modal-detail-line strong { color: #fff; }
        .modal-detail-line span { color: var(--primary-orange); font-weight: bold; text-align: right; max-width: 55%; }
        
        .precision-box { background-color: var(--danger-bg); border: 1px solid var(--danger-red); color: var(--danger-red); padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 0.9em; font-weight: 600; display: flex; align-items: center; gap: 10px; line-height: 1.4; }


        /* =========================================
           VERSION MOBILE UNIQUEMENT (Matière INSANE)
           ========================================= */
        @media (max-width: 768px) {
            header { padding: 15px 0; }
            h1 { font-size: 1.8em; }

            /* Boutons de filtre en swipe horizontal (comme TikTok/Insta) */
            .filters {
                flex-wrap: nowrap;
                justify-content: flex-start;
                overflow-x: auto;
                padding: 10px 20px 20px 20px;
                margin: 0;
                scroll-snap-type: x mandatory;
                scrollbar-width: none; /* Cache la barre de scroll Firefox */
            }
            .filters::-webkit-scrollbar { display: none; } /* Cache la barre de scroll Chrome/Safari */
            button { scroll-snap-align: start; }

            /* Grille compacte (2 colonnes) */
            #shop-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 10px 20px;
            }
            .shop-card { padding: 15px 10px; border-radius: 12px; }
            .shop-logo-container { width: 50px; height: 50px; margin-bottom: 10px; }
            .logo-initial { font-size: 1.5em; }
            .shop-card h3 { font-size: 0.95em; margin-bottom: 8px; }
            .category-badge { font-size: 0.6em; padding: 3px 8px; }

            /* Le Modal façon iOS "Bottom Sheet" */
            .modal {
                display: none; align-items: flex-end; /* Aligné en bas */
            }
            .modal-content {
                width: 100%; margin: 0; max-width: 100%;
                border-radius: 25px 25px 0 0; /* Arrondi seulement en haut */
                border-left: none; border-right: none; border-bottom: none;
                padding: 30px 20px 40px 20px;
                animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            .close-modal { top: 10px; right: 20px; font-size: 40px; }
            
            @keyframes slideUp {
                from { transform: translateY(100%); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }

            .modal-detail-line { flex-direction: column; align-items: flex-start; gap: 5px; border-bottom: none; margin-bottom: 15px; }
            .modal-detail-line span { text-align: left; max-width: 100%; font-size: 1.1em; }
            .option-block { border-bottom: 1px solid #333; border-radius: 0; background: transparent; padding: 10px 0; }
        }
    </style>
</head>

<div id="lock-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#121212; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif;">
    <h1 style="color:#ff6600; margin-bottom:20px; font-size:1.5rem; text-transform:uppercase; letter-spacing:2px;">Accès Restreint</h1>
    <input type="password" id="passInput" placeholder="Entrez le code..." style="padding:15px; border-radius:30px; border:2px solid #ff6600; background:#1e1e1e; color:white; outline:none; text-align:center; width:250px; font-size:1rem;">
    <button onclick="checkPass()" style="margin-top:20px; padding:12px 30px; background:#ff6600; color:black; border:none; border-radius:30px; font-weight:bold; cursor:pointer; text-transform:uppercase;">Valider</button>
    <p id="errorMessage" style="color:#ff4d4d; margin-top:15px; font-size:0.9rem; display:none;">Code incorrect. Accès refusé.</p>
</div>

<script>
    // Le mot de passe est "clients"
    function checkPass() {
        const pass = document.getElementById('passInput').value;
        if (pass.toLowerCase() === "clients") {
            document.getElementById('lock-screen').style.display = 'none';
            localStorage.setItem('siteAccess', 'granted'); // S'en souvient pour la prochaine fois
        } else {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('passInput').style.borderColor = '#ff4d4d';
        }
    }

    // Vérifie si l'utilisateur a déjà entré le code auparavant
    window.onload = function() {
        if (localStorage.getItem('siteAccess') === 'granted') {
            document.getElementById('lock-screen').style.display = 'none';
        }
    }
    
    // Permet de valider avec la touche "Entrée"
    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { checkPass(); }
    });
</script>

        function renderShops(shopList) {
            const container = document.getElementById('shop-container');
            container.innerHTML = ''; 
            
            shopList.sort((a, b) => a.name.localeCompare(b.name));

            shopList.forEach(shop => {
                const card = document.createElement('div');
                card.className = 'shop-card';
                card.onclick = () => openModal(shop.id);
                
                const initial = shop.name.charAt(0).toUpperCase();

                card.innerHTML = `
                    <div class="shop-logo-container">
                         <span class="logo-initial">${initial}</span>
                    </div>
                    <h3>${shop.name}</h3>
                    <span class="category-badge">${shop.category}</span>
                `;
                container.appendChild(card);
            });
        }

        function filterShops(category) {
            document.getElementById('searchInput').value = '';

            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            if(event && event.target) {
                event.target.classList.add('active');
                
                // Petit bonus : recentre le bouton scrollé sur mobile
                event.target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            } else {
                document.getElementById('btn-tout').classList.add('active');
            }

            if (category === 'TOUT') {
                renderShops(shops);
            } else {
                const filtered = shops.filter(shop => shop.category === category);
                renderShops(filtered);
            }
        }

        function searchShops() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            
            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-tout').classList.add('active');

            const filtered = shops.filter(shop => shop.name.toLowerCase().includes(query));
            renderShops(filtered);
        }

        const modal = document.getElementById("shopModal");

        function openModal(shopId) {
            const shop = shops.find(s => s.id === shopId);
            const modalBody = document.getElementById("modal-body");
            const initial = shop.name.charAt(0).toUpperCase();

            let htmlContent = `
                <div id="modal-header">
                     <div class="shop-logo-container">
                         <span class="logo-initial">${initial}</span>
                    </div>
                    <h2>${shop.name}</h2>
                    <span class="category-badge">${shop.category}</span>
                </div>
            `;

            shop.options.forEach((opt, index) => {
                htmlContent += `<div class="option-block">`;
                
                if (shop.options.length > 1) {
                    htmlContent += `<h4>Option ${index + 1}</h4>`;
                }

                htmlContent += `
                    <div class="modal-detail-line"><strong>Maximum possible :</strong> <span>${opt.max}</span></div>
                    <div class="modal-detail-line"><strong>Délai estimé :</strong> <span>${opt.delay}</span></div>
                `;

                if (opt.precision && opt.precision.trim() !== "") {
                    htmlContent += `
                        <div class="precision-box">
                            ⚠️ <span>${opt.precision}</span>
                        </div>
                    `;
                }

                htmlContent += `</div>`; 
            });

            modalBody.innerHTML = htmlContent;
            
            // Animation d'ouverture fluide sur mobile
            modal.style.display = "flex";
        }

        function closeModal() { modal.style.display = "none"; }
        
        // Ferme si on clique en dehors du contenu
        window.onclick = function(event) { 
            if (event.target == modal) { 
                modal.style.display = "none"; 
            } 
        }

        // Permet aussi de swiper vers le bas pour fermer le modal (effet natif)
        let touchstartY = 0;
        let touchendY = 0;

        modal.addEventListener('touchstart', e => { touchstartY = e.changedTouches[0].screenY; });
        modal.addEventListener('touchend', e => { 
            touchendY = e.changedTouches[0].screenY;
            if (touchendY > touchstartY + 50) { // Si on a glissé vers le bas de 50px
                closeModal();
            }
        });

        renderShops(shops);
    </script>
