<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOUTIQUE BY FRANKLIN</title>
    <style>
        /* Design Orange & Noir Premium Compact - Franklin Edition */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary-orange: #ff6600;
            --text-main: #e0e0e0;
            --text-muted: #aaa;
            --hover-shadow: rgba(255, 102, 0, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #000;
            color: var(--primary-orange);
            padding: 25px 0;
            text-align: center;
            border-bottom: 2px solid var(--primary-orange);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        h1 { margin: 0; font-size: 2.8em; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }

        .filters {
            display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; margin: 40px auto; max-width: 90%; padding: 10px;
        }
        button {
            padding: 12px 28px; border: 2px solid var(--primary-orange); border-radius: 30px;
            background-color: transparent; color: var(--primary-orange); cursor: pointer; font-weight: bold;
            font-size: 0.95em; text-transform: uppercase; transition: all 0.3s ease;
        }
        button:hover, button.active { background-color: var(--primary-orange); color: #000; box-shadow: 0 0 15px var(--primary-orange); }

        #shop-container {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px;
            max-width: 1200px; margin: 0 auto 50px auto; padding: 20px; flex-grow: 1;
        }

        .shop-card {
            background-color: var(--card-bg); 
            /* padding réduit pour la compacité */
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #333;
            text-align: center; 
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; /* Aligne les éléments en haut */
            height: auto; /* Supprime toute hauteur fixe excessive */
        }
        .shop-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px var(--hover-shadow); border-color: var(--primary-orange); }

        /* Conteneur de la Lettrine Compact */
        .shop-logo-container {
            /* taille réduite de 100px à 70px */
            width: 70px; 
            height: 70px; 
            margin-bottom: 15px; /* espace réduit */
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 50%; 
            background-color: #2a2a2a; 
            border: 2px solid #333; 
            transition: border-color 0.3s ease;
        }
        .shop-card:hover .shop-logo-container { border-color: var(--primary-orange); }

        .logo-initial {
            /* taille de police réduite de 3em à 2.2em */
            font-size: 2.2em; 
            font-weight: bold; 
            color: var(--primary-orange); 
            text-transform: uppercase;
        }

        .shop-card h3 { 
            color: #fff; 
            /* marges réduites */
            margin: 5px 0 10px 0; 
            /* taille de police réduite de 1.4em à 1.2em */
            font-size: 1.2em; 
            font-weight: 700; 
        }

        .category-badge {
            display: inline-block; 
            margin-top: 0; /* Supprime l'espace supérieur excessif */
            /* padding réduit */
            padding: 4px 12px; 
            background-color: #2a2a2a; 
            color: var(--primary-orange);
            border: 1px solid var(--primary-orange); 
            border-radius: 20px; 
            /* taille de police réduite de 0.8em à 0.75em */
            font-size: 0.75em; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .shop-card:hover .category-badge { background-color: var(--primary-orange); color: #000; }

        /* Modal (inchangé pour les détails) */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: var(--card-bg); color: var(--text-main); margin: 8% auto; padding: 40px; border: 2px solid var(--primary-orange);
            border-radius: 20px; width: 85%; max-width: 650px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.7); text-align: center;
        }
        .close-modal { color: var(--primary-orange); position: absolute; top: 15px; right: 25px; font-size: 35px; font-weight: bold; cursor: pointer; transition: transform 0.2s ease; }
        .close-modal:hover { transform: scale(1.2); color: #fff; }

        #modal-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        #modal-body h2 { color: var(--primary-orange); margin-bottom: 5px; font-size: 2.2em; }
        
        .modal-shop-details {
            text-align: left; max-width: 90%; margin: 0 auto; background-color: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333;
        }
        .modal-detail-line { font-size: 1.1em; margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; }
        .modal-detail-line strong { color: #fff; }
        .modal-detail-line span { color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <h1>BOUTIQUE BY FRANKLIN</h1>
    </header>

    <div class="filters">
        <button class="active" onclick="filterShops('TOUT')">TOUT</button>
        <button onclick="filterShops('LUXE')">LUXE</button>
        <button onclick="filterShops('TECH')">TECH</button>
        <button onclick="filterShops('MODE')">MODE</button>
        <button onclick="filterShops('SPORT')">SPORT</button>
        <button onclick="filterShops('BEAUTE')">BEAUTÉ</button>
        <button onclick="filterShops('MAISON')">MAISON</button>
        <button onclick="filterShops('AUTO')">AUTO</button>
        <button onclick="filterShops('DIVERS')">DIVERS</button>
    </div>

    <div id="shop-container"></div>

    <div id="shopModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // Base de données simple, sans appels externes
        const shops = [
            { id: 1, name: "ZARA", category: "MODE", delay: "3 jours", account: "Non requis", return: "Possible" },
            { id: 2, name: "Apple", category: "TECH", delay: "Immédiat", account: "Requis (historique d'achat)", return: "Possible" },
            { id: 3, name: "Sephora", category: "BEAUTE", delay: "2 jours", account: "Non requis", return: "Possible" },
            { id: 4, name: "Rolex", category: "LUXE", delay: "Sur commande", account: "Oui (profil VIP)", return: "Non possible" },
            { id: 5, name: "Decathlon", category: "SPORT", delay: "1 jour", account: "Non requis", return: "Possible" },
            { id: 6, name: "Ikea", category: "MAISON", delay: "4 jours", account: "Non requis", return: "Possible" },
            { id: 7, name: "Boulanger", category: "TECH", delay: "2 jours", account: "Non requis", return: "Possible" },
            { id: 8, name: "Norauto", category: "AUTO", delay: "3 jours", account: "Non requis", return: "Possible" },
            { id: 9, name: "Fnac", category: "DIVERS", delay: "Immédiat", account: "Non requis", return: "Possible" },
            { id: 10, name: "Louis Vuitton", category: "LUXE", delay: "Sur commande", account: "Oui (historique requis)", return: "Non possible" },
            { id: 11, name: "Nike", category: "SPORT", delay: "2 jours", account: "Oui (compte membre)", return: "Possible" }
        ];

        function renderShops(shopList) {
            const container = document.getElementById('shop-container');
            container.innerHTML = ''; 
            shopList.sort((a, b) => a.name.localeCompare(b.name));

            shopList.forEach(shop => {
                const card = document.createElement('div');
                card.className = 'shop-card';
                card.onclick = () => openModal(shop.id);
                
                // On récupère juste la première lettre de la boutique
                const initial = shop.name.charAt(0).toUpperCase();

                card.innerHTML = `
                    <div class="shop-logo-container">
                         <span class="logo-initial">${initial}</span>
                    </div>
                    <h3>${shop.name}</h3>
                    <span class="category-badge">${shop.category}</span>
                `;
                container.appendChild(card);
            });
        }

        function filterShops(category) {
            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');

            if (category === 'TOUT') {
                renderShops(shops);
            } else {
                const filtered = shops.filter(shop => shop.category === category);
                renderShops(filtered);
            }
        }

        const modal = document.getElementById("shopModal");

        function openModal(shopId) {
            const shop = shops.find(s => s.id === shopId);
            const modalBody = document.getElementById("modal-body");
            const initial = shop.name.charAt(0).toUpperCase();

            modalBody.innerHTML = `
                <div id="modal-header">
                     <div class="shop-logo-container">
                         <span class="logo-initial">${initial}</span>
                    </div>
                    <h2>${shop.name}</h2>
                    <span class="category-badge" style="margin-top: 5px;">${shop.category}</span>
                </div>
                <div class="modal-shop-details">
                    <div class="modal-detail-line"><strong>Délai :</strong> <span>${shop.delay}</span></div>
                    <div class="modal-detail-line"><strong>Compte :</strong> <span>${shop.account}</span></div>
                    <div class="modal-detail-line"><strong>Retour :</strong> <span>${shop.return}</span></div>
                </div>
            `;
            modal.style.display = "block";
        }

        function closeModal() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        renderShops(shops);
    </script>
</body>
</html>
