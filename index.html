<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOUTIQUE BY FRANKLIN</title>
    <style>
        /* Design Orange & Noir */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Fond Noir */
            color: #e0e0e0; /* Texte clair */
            margin: 0;
            padding: 0;
        }

        /* En-tête */
        header {
            background-color: #000;
            color: #ff6600; /* Titre Orange */
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid #ff6600;
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
            text-transform: uppercase;
        }

        /* Barre de navigation / Filtres */
        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 30px auto;
            max-width: 90%;
        }
        button {
            padding: 10px 25px;
            border: 2px solid #ff6600;
            border-radius: 25px;
            background-color: transparent;
            color: #ff6600;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover, button.active {
            background-color: #ff6600;
            color: #000;
        }

        /* Grille des boutiques */
        #shop-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Carte de boutique */
        .shop-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: left;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer; /* Indique qu'on peut cliquer */
        }
        .shop-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(255, 102, 0, 0.3);
            border-color: #ff6600;
        }
        .shop-card h3 {
            color: #ff6600;
            margin-top: 0;
        }
        .shop-details {
            font-size: 0.9em;
            color: #bbb;
            margin-top: 10px;
        }
        .detail-line { margin-bottom: 5px; }
        .category-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 5px 12px;
            background-color: #ff6600;
            color: #000;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }

        /* Fenêtre Modal (Pop-up) */
        .modal {
            display: none; /* Caché par défaut */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            background-color: #1e1e1e;
            color: #e0e0e0;
            margin: 10% auto;
            padding: 30px;
            border: 2px solid #ff6600;
            border-radius: 12px;
            width: 80%;
            max-width: 600px;
            position: relative;
        }
        .close-modal {
            color: #ff6600;
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>BOUTIQUE BY FRANKLIN</h1>
    </header>

    <div class="filters">
        <button class="active" onclick="filterShops('TOUT')">TOUT</button>
        <button onclick="filterShops('LUXE')">LUXE</button>
        <button onclick="filterShops('TECH')">TECH</button>
        <button onclick="filterShops('MODE')">MODE</button>
        <button onclick="filterShops('SPORT')">SPORT</button>
        <button onclick="filterShops('BEAUTE')">BEAUTÉ</button>
        <button onclick="filterShops('MAISON')">MAISON</button>
        <button onclick="filterShops('AUTO')">AUTO</button>
        <button onclick="filterShops('DIVERS')">DIVERS</button>
    </div>

    <div id="shop-container"></div>

    <div id="shopModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script>
        // Fausse base de données mise à jour (pour tester tes nouveaux critères)
        const shops = [
            { id: 1, name: "ZARA", category: "MODE", delay: "3 jours", account: "Non requis", return: "Possible" },
            { id: 2, name: "Apple Store", category: "TECH", delay: "Immédiat", account: "Requis (historique d'achat)", return: "Possible" },
            { id: 3, name: "Sephora", category: "BEAUTE", delay: "2 jours", account: "Non requis", return: "Possible" },
            { id: 4, name: "Rolex", category: "LUXE", delay: "Sur commande", account: "Oui (profil VIP)", return: "Non possible" },
            { id: 5, name: "Decathlon", category: "SPORT", delay: "1 jour", account: "Non requis", return: "Possible" },
            { id: 6, name: "Ikea", category: "MAISON", delay: "4 jours", account: "Non requis", return: "Possible" },
            { id: 7, name: "Boulanger", category: "TECH", delay: "2 jours", account: "Non requis", return: "Possible" },
            { id: 8, name: "Norauto", category: "AUTO", delay: "3 jours", account: "Non requis", return: "Possible" },
            { id: 9, name: "Fnac", category: "DIVERS", delay: "Immédiat", account: "Non requis", return: "Possible" },
            { id: 10, name: "Louis Vuitton", category: "LUXE", delay: "Sur commande", account: "Oui (historique requis)", return: "Non possible" },
            { id: 11, name: "Nike", category: "SPORT", delay: "2 jours", account: "Oui (compte membre)", return: "Possible" }
        ];

        // Fonction pour afficher les boutiques
        function renderShops(shopList) {
            const container = document.getElementById('shop-container');
            container.innerHTML = ''; // On vide le conteneur

            // Tri de A à Z
            shopList.sort((a, b) => a.name.localeCompare(b.name));

            // On crée les cartes pour chaque boutique
            shopList.forEach(shop => {
                const card = document.createElement('div');
                card.className = 'shop-card';
                card.onclick = () => openModal(shop.id); // Ouvre le pop-up au clic
                card.innerHTML = `
                    <h3>${shop.name}</h3>
                    <div class="shop-details">
                        <div class="detail-line"><strong>Délai :</strong> ${shop.delay}</div>
                        <div class="detail-line"><strong>Compte :</strong> ${shop.account}</div>
                        <div class="detail-line"><strong>Retour :</strong> ${shop.return}</div>
                    </div>
                    <span class="category-badge">${shop.category}</span>
                `;
                container.appendChild(card);
            });
        }

        // Fonction pour filtrer selon l'onglet cliqué
        function filterShops(category) {
            // Mettre à jour le bouton actif
            document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Filtrer les données
            if (category === 'TOUT') {
                renderShops(shops);
            } else {
                const filtered = shops.filter(shop => shop.category === category);
                renderShops(filtered);
            }
        }

        // Fonctions pour gérer le pop-up (Modal)
        const modal = document.getElementById("shopModal");

        function openModal(shopId) {
            const shop = shops.find(s => s.id === shopId);
            const modalBody = document.getElementById("modal-body");
            modalBody.innerHTML = `
                <h2>${shop.name}</h2>
                <span class="category-badge">${shop.category}</span>
                <div class="shop-details" style="font-size: 1.1em; margin-top: 20px;">
                    <div class="detail-line"><strong>Délai de traitement :</strong> ${shop.delay}</div>
                    <div class="detail-line"><strong>Type de compte :</strong> ${shop.account}</div>
                    <div class="detail-line"><strong>Politique de retour :</strong> ${shop.return}</div>
                    <p style="margin-top: 20px; color: #aaa;">
                        Voici plus de détails sur cette boutique... Tu pourras plus tard ajouter ici une description complète, l'adresse, ou un lien vers leur site, directement depuis ton fichier Excel.
                    </p>
                </div>
            `;
            modal.style.display = "block";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        // Fermer le pop-up si on clique en dehors
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        // Afficher "TOUT" au chargement de la page
        renderShops(shops);
    </script>
</body>
</html>
